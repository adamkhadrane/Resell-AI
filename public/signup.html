<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — ResellAI</title>
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { background: var(--gray-50); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: var(--shadow-md); }
    .auth-logo { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--blue-500); text-align: center; margin-bottom: .25rem; }
    .auth-logo span { color: var(--gray-900); }
    .auth-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: .4rem; }
    .auth-sub { text-align: center; font-size: .875rem; color: var(--gray-500); margin-bottom: 1.75rem; }
    .auth-form { display: flex; flex-direction: column; gap: 1rem; }
    .divider-text { display: flex; align-items: center; gap: .75rem; color: var(--gray-400); font-size: .8rem; }
    .divider-text::before,.divider-text::after { content:''; flex:1; height:1px; background:var(--gray-200); }
    .google-btn { display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;padding:.7rem;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);font-family:var(--font-body);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;color:var(--gray-800); }
    .google-btn:hover { background:var(--gray-50);border-color:var(--gray-300); }
    .auth-footer { text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--gray-500); }
    .auth-footer a { color:var(--blue-500);font-weight:600; }
    .plan-selector { display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.25rem; }
    .plan-opt { border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:.75rem;cursor:pointer;transition:all .2s; }
    .plan-opt:hover { border-color:var(--blue-300); }
    .plan-opt.selected { border-color:var(--blue-500);background:var(--blue-50); }
    .plan-opt-name { font-weight:700;font-size:.875rem;color:var(--gray-900); }
    .plan-opt-price { font-size:.75rem;color:var(--gray-500);margin-top:.1rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-logo">Resell<span>AI</span></a>
  <div id="navbar-actions"></div>
</nav>

<div class="auth-wrap" style="padding-top:90px;">
  <div class="auth-card">
    <div class="auth-logo">Resell<span>AI</span></div>
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Start flipping smarter — free to get started</div>

    <div id="alert-box" style="display:none;margin-bottom:1rem;"></div>

    <button class="google-btn" onclick="signUpWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Sign up with Google
    </button>

    <div class="divider-text" style="margin:1.25rem 0;">or</div>

    <form class="auth-form" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" class="form-input" id="fullname" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="At least 8 characters" minlength="8" required />
      </div>
      <button type="submit" class="btn btn-primary" id="signup-btn" style="width:100%;margin-top:.25rem;">
        Create free account
      </button>
    </form>

    <p class="text-xs text-gray text-center mt-4">By signing up you agree to our <a href="/terms.html" style="color:var(--blue-500);">Terms</a> and <a href="/privacy.html" style="color:var(--blue-500);">Privacy Policy</a>.</p>

    <div class="auth-footer">
      Already have an account? <a href="/login.html">Log in</a>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const alertBox = document.getElementById('alert-box');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating account...';
  alertBox.style.display = 'none';

  const { error } = await sb.auth.signUp({
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    options: {
      data: { full_name: document.getElementById('fullname').value }
    }
  });

  if (error) {
    alertBox.innerHTML = `<div class="alert alert-error">⚠️ ${error.message}</div>`;
    alertBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create free account';
  } else {
    alertBox.innerHTML = `<div class="alert alert-success">✅ Account created! Check your email to confirm, then log in.</div>`;
    alertBox.style.display = 'block';
    btn.textContent = 'Check your email';

    // Auto redirect after 3s
    setTimeout(() => window.location.href = '/dashboard.html', 3000);
  }
}

async function signUpWithGoogle() {
  const plan = new URLSearchParams(window.location.search).get('plan');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + (plan ? `/pricing.html?plan=${plan}` : '/dashboard.html')
    }
  });
  if (error) showToast(error.message, 'error');
}

(async () => {
  const user = await getUser();
  if (user) window.location.href = '/dashboard.html';

  // Pre-fill plan from URL
  const plan = new URLSearchParams(window.location.search).get('plan');
  if (plan) {
    const planEl = document.querySelector(`[data-plan="${plan}"]`);
    if (planEl) planEl.classList.add('selected');
  }
})();
</script>
</body>
</html>
