<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ResellAI</title>
  <link rel="stylesheet" href="/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { background: var(--gray-50); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-xl); padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-logo">Resell<span>AI</span></a>
  <div id="navbar-actions"></div>
</nav>
<div class="auth-wrap" style="padding-top:90px;">
  <div class="auth-card">
    <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--blue-500);text-align:center;margin-bottom:.25rem;">Resell<span style="color:var(--gray-900);">AI</span></div>
    <div style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:.4rem;">Reset your password</div>
    <p class="text-gray text-sm text-center" style="margin-bottom:1.75rem;">Enter your email and we'll send you a reset link.</p>

    <div id="alert-box" style="display:none;margin-bottom:1rem;"></div>

    <form onsubmit="handleReset(event)" style="display:flex;flex-direction:column;gap:1rem;">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
      </div>
      <button type="submit" class="btn btn-primary" id="reset-btn">Send reset link</button>
    </form>
    <div style="text-align:center;margin-top:1.25rem;font-size:.875rem;color:var(--gray-500);">
      <a href="/login.html" style="color:var(--blue-500);font-weight:600;">← Back to login</a>
    </div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
async function handleReset(e) {
  e.preventDefault();
  const btn = document.getElementById('reset-btn');
  const alertBox = document.getElementById('alert-box');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Sending...';

  const { error } = await sb.auth.resetPasswordForEmail(document.getElementById('email').value, {
    redirectTo: window.location.origin + '/update-password.html',
  });

  if (error) {
    alertBox.innerHTML = `<div class="alert alert-error">⚠️ ${error.message}</div>`;
    alertBox.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Send reset link';
  } else {
    alertBox.innerHTML = `<div class="alert alert-success">✅ Reset link sent! Check your email.</div>`;
    alertBox.style.display = 'block';
    btn.textContent = 'Email sent';
  }
}
</script>
</body>
</html>
